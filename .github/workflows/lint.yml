name: Lint

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning

  shfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shfmt
        run: |
          curl -sSfL https://github.com/mvdan/sh/releases/latest/download/shfmt_v3.8.0_linux_amd64 \
            -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt

      - name: Check formatting
        run: |
          shfmt -d -i 2 -ci \
            bin/pass-ui \
            lib/backend.sh lib/ui.sh lib/utils.sh lib/validation.sh \
            install uninstall
